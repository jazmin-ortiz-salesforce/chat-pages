<button id="showButton">Show Button</button>
<script type='text/javascript'>
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'ar'; // For example, enter 'en' or 'en-US'

			embeddedservice_bootstrap.init(
				'00DSB00000qZGWz',
				'web2',
				'https://orgfarm-c89cc8d30e.test1.my.pc-rnd.site.com/ESWweb21779201362163',
				{
					scrt2URL: 'https://orgfarm-c89cc8d30e.test1.my.pc-rnd.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
	window.addEventListener("onEmbeddedMessagingConversationStarted", (event) => {
  		console.log("Received the onEmbeddedMessagingConversationStarted event…");
		alert("Received the onEmbeddedMessagingConversationStarted event…");
	});

	window.addEventListener("onEmbeddedMessagingButtonCreated", (event) => {
  		embeddedservice_bootstrap.utilAPI.hideChatButton();
	});

	window.addEventListener("onEmbeddedMessagingReady", () => {
    	console.log("Received the onEmbeddedMessagingReady event…");

    	// Send data to Salesforce
   	 embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({"FavoriteDrink" : "Water!"});

	embeddedservice_bootstrap.prechatAPI.setVisiblePrechatFields({
    	// List the pre-chat field names with the value and whether
   	 	// it's editable in the pre-chat form.
    	"_firstName": {
      	"value": "Jane",
      	"isEditableByEndUser": false
    	}
  	});

});


	const button = document.getElementById('showButton');
		button.addEventListener('click', function() {
    	embeddedservice_bootstrap.utilAPI.showChatButton();
	});
</script>
<script type='text/javascript' src='https://orgfarm-c89cc8d30e.test1.my.pc-rnd.site.com/ESWweb21779201362163/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>
